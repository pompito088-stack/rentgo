<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Mis Pagos', null)}"></head>
<body class="client-layout">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main>
    <!-- Mini hero -->
    <section style="background:linear-gradient(135deg,var(--teal-800),var(--teal-600));padding:2rem 0 1.75rem;color:#fff;">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2" style="--bs-breadcrumb-divider-color:rgba(255,255,255,.5);">
                    <li class="breadcrumb-item"><a th:href="@{/}" style="color:rgba(255,255,255,.7);text-decoration:none;">Inicio</a></li>
                    <li class="breadcrumb-item active" style="color:#fff;">Mis Pagos</li>
                </ol>
            </nav>
            <h1 style="font-size:1.6rem;font-weight:800;margin:0;">
                <i class="bi bi-credit-card me-2"></i>Mis Pagos
            </h1>
        </div>
    </section>

    <div class="container py-4">

        <!-- Sin pagos -->
        <div th:if="${#lists.isEmpty(pagos)}" class="text-center py-5">
            <i class="bi bi-receipt" style="font-size:3.5rem;color:#d1d5db;"></i>
            <p class="mt-3 text-muted" style="font-size:1.05rem;">Aun no tienes pagos registrados.</p>
            <a th:href="@{/vehiculos}" class="btn btn-teal mt-2"><i class="bi bi-car-front me-1"></i>Ver vehiculos</a>
        </div>

        <!-- Lista de pagos -->
        <div class="row g-3" th:unless="${#lists.isEmpty(pagos)}">
            <article th:each="pago : ${pagos}" class="col-md-6 col-xl-4">
                <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;transition:box-shadow .25s,transform .25s;height:100%;"
                     onmouseover="this.style.boxShadow='0 8px 32px rgba(0,0,0,.1)';this.style.transform='translateY(-3px)'"
                     onmouseout="this.style.boxShadow='';this.style.transform=''">

                    <!-- Header -->
                    <div style="padding:.75rem 1.1rem;display:flex;align-items:center;justify-content:space-between;"
                         th:styleappend="${pago.estadoPago == 'reembolsado'} ? 'background:#fef2f2;' : 'background:#f0fdf4;'">
                        <span style="font-size:.78rem;font-weight:600;color:#6b7280;">
                            Pago #<span th:text="${pago.id}"></span>
                            · Reserva #<span th:text="${pago.reserva.id}"></span>
                        </span>
                        <span class="badge rounded-pill"
                              style="font-size:.75rem;padding:.3em .7em;"
                              th:classappend="${pago.estadoPago == 'reembolsado'} ? 'bg-danger' : 'bg-success'"
                              th:text="${pago.estadoPago == 'reembolsado' ? 'Reembolsado' : 'Realizado'}"></span>
                    </div>

                    <!-- Body: SIEMPRE muestra los datos del pago original -->
                    <div style="padding:1.1rem;flex:1;display:flex;flex-direction:column;">
                        <!-- Vehiculo -->
                        <h3 style="font-size:1rem;font-weight:700;color:#111827;margin-bottom:.6rem;"
                            th:text="${pago.reserva.vehiculo.modelo.marca.nombre + ' ' + pago.reserva.vehiculo.modelo.nombre}"></h3>

                        <!-- Fechas reserva -->
                        <div class="d-flex gap-3 mb-2" style="font-size:.83rem;color:#6b7280;">
                            <div>
                                <i class="bi bi-calendar-event me-1"></i>
                                <span th:text="${pago.reserva.fechaInicio}"></span>
                            </div>
                            <span>&rarr;</span>
                            <div>
                                <span th:text="${pago.reserva.fechaFin}"></span>
                            </div>
                        </div>

                        <!-- Fecha pago -->
                        <div style="font-size:.82rem;color:#9ca3af;margin-bottom:.75rem;">
                            <i class="bi bi-clock me-1"></i>Pagado el <span th:text="${pago.fechaPago}"></span>
                        </div>

                        <!-- Metodo de pago -->
                        <div class="d-flex align-items-center gap-1 mb-2" style="font-size:.85rem;color:#374151;">
                            <i th:if="${pago.metodoPago == 'tarjeta_credito' or pago.metodoPago == 'tarjeta_debito'}"
                               class="bi bi-credit-card-fill" style="color:#6366f1;"></i>
                            <i th:if="${pago.metodoPago == 'paypal'}"
                               class="bi bi-paypal" style="color:#003087;"></i>
                            <span th:text="${pago.metodoPago == 'tarjeta_credito' ? 'Tarjeta de credito' :
                                           (pago.metodoPago == 'tarjeta_debito' ? 'Tarjeta de debito' : 'PayPal')}"></span>
                        </div>

                        <!-- Importe y fianza -->
                        <div style="background:var(--teal-50);border-radius:10px;padding:.6rem .85rem;">
                            <div class="d-flex justify-content-between" style="font-size:.85rem;margin-bottom:.25rem;">
                                <span style="color:#6b7280;">Alquiler</span>
                                <span style="font-weight:700;color:var(--teal-700);"
                                      th:text="${#numbers.formatDecimal(pago.importe, 1, 2)} + ' €'"></span>
                            </div>
                            <div class="d-flex justify-content-between" style="font-size:.82rem;"
                                 th:if="${pago.fianza != null and pago.fianza > 0}">
                                <span style="color:#92400e;"><i class="bi bi-shield-check me-1"></i>Fianza</span>
                                <span style="font-weight:600;color:#92400e;"
                                      th:text="${#numbers.formatDecimal(pago.fianza, 1, 2)} + ' €'"></span>
                            </div>
                            <hr style="border-color:var(--teal-100);margin:.4rem 0;" th:if="${pago.fianza != null and pago.fianza > 0}">
                            <div class="d-flex justify-content-between" th:if="${pago.fianza != null and pago.fianza > 0}">
                                <span style="font-size:.88rem;font-weight:700;color:#111827;">Total cobrado</span>
                                <span style="font-size:1.05rem;font-weight:800;color:var(--teal-600);"
                                      th:text="${#numbers.formatDecimal(pago.importe.add(pago.fianza), 1, 2)} + ' €'"></span>
                            </div>
                        </div>

                        <!-- ====== BOTON + COLAPSABLE DE DEVOLUCION ====== -->
                        <div th:if="${pago.estadoPago == 'reembolsado'}" style="margin-top:.75rem;">
                            <button type="button"
                                    class="btn btn-sm w-100 d-flex align-items-center justify-content-center gap-1"
                                    style="background:#fef2f2;color:#dc2626;border:1px solid #fecaca;font-weight:600;font-size:.82rem;border-radius:9px;"
                                    data-bs-toggle="collapse"
                                    th:attr="data-bs-target='#dev-' + ${pago.id},aria-controls='dev-' + ${pago.id}"
                                    aria-expanded="false">
                                <i class="bi bi-arrow-return-left"></i>
                                Ver datos de la devolucion
                                <i class="bi bi-chevron-down ms-auto"></i>
                            </button>

                            <div class="collapse mt-2" th:id="'dev-' + ${pago.id}">
                                <!-- Si existe Devolucion en BD: mostrar datos reales -->
                                <div th:if="${pago.devolucion != null}"
                                     style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:.75rem .9rem;">
                                    <div class="d-flex align-items-center gap-2 mb-2">
                                        <i class="bi bi-receipt-cutoff" style="color:#dc2626;font-size:1.05rem;"></i>
                                        <span style="font-size:.85rem;font-weight:700;color:#dc2626;">
                                            Devolucion #<span th:text="${pago.devolucion.id}"></span>
                                        </span>
                                    </div>
                                    <div class="d-flex justify-content-between mb-1" style="font-size:.82rem;color:#374151;">
                                        <span><i class="bi bi-calendar-check me-1"></i>Fecha</span>
                                        <span style="font-weight:600;" th:text="${pago.devolucion.fechaDevolucion}"></span>
                                    </div>
                                    <div class="d-flex justify-content-between mb-1" style="font-size:.82rem;color:#374151;">
                                        <span><i class="bi bi-arrow-counterclockwise me-1"></i>Devuelto a</span>
                                        <span style="font-weight:600;"
                                              th:text="${pago.metodoPago == 'tarjeta_credito' ? 'Tarjeta credito' :
                                                       (pago.metodoPago == 'tarjeta_debito' ? 'Tarjeta debito' : 'PayPal')}"></span>
                                    </div>
                                    <hr style="border-color:#fecaca;margin:.45rem 0;">
                                    <div class="d-flex justify-content-between align-items-baseline">
                                        <span style="font-size:.88rem;font-weight:700;color:#111827;">Importe reembolsado</span>
                                        <span style="font-size:1.15rem;font-weight:800;color:#dc2626;"
                                              th:text="${#numbers.formatDecimal(pago.devolucion.importeReembolsado, 1, 2)} + ' €'"></span>
                                    </div>
                                    <div th:if="${pago.devolucion.motivo != null and !pago.devolucion.motivo.isBlank()}"
                                         style="font-size:.78rem;color:#6b7280;margin-top:.5rem;border-top:1px dashed #fecaca;padding-top:.45rem;">
                                        <i class="bi bi-chat-left-text me-1"></i>
                                        <span th:text="${pago.devolucion.motivo}"></span>
                                    </div>
                                </div>

                                <!-- Si NO hay registro de Devolucion (pagos historicos): aviso -->
                                <div th:if="${pago.devolucion == null}"
                                     style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:.7rem .9rem;font-size:.8rem;color:#92400e;">
                                    <i class="bi bi-info-circle me-1"></i>
                                    Este pago figura como reembolsado pero no se encontro un registro de devolucion asociado.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
