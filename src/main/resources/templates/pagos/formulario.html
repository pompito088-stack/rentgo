<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Pago')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title">
            <i class="bi bi-credit-card me-2" style="color:var(--teal-600)"></i>
            <span th:text="${pago.id != null ? 'Editar Pago' : 'Nuevo Pago'}">Formulario</span>
        </h1>
        <div class="topbar-right">
            <a th:href="@{/pagos}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
    </header>
    <main class="admin-page-content">
        <div class="admin-card">
            <form th:action="@{/pagos/guardar}" th:object="${pago}" method="post" class="row g-3" novalidate>
                <input type="hidden" th:field="*{id}">

                <div class="col-md-6">
                    <label for="reserva" class="form-label">Reserva</label>
                    <select class="form-select" id="reserva" th:field="*{reserva.id}" required>
                        <option value="">-- Seleccionar reserva --</option>
                        <option th:each="r : ${reservas}" th:value="${r.id}"
                                th:text="'#' + ${r.id} + ' - ' + ${r.usuario.nombre} + ' - ' + ${r.vehiculo.modelo.nombre}"></option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="fechaPago" class="form-label">Fecha de Pago</label>
                    <input type="date" class="form-control" th:classappend="${#fields.hasErrors('fechaPago')} ? 'is-invalid'"
                           id="fechaPago" th:field="*{fechaPago}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaPago')}" th:errors="*{fechaPago}"></div>
                </div>

                <div class="col-md-3">
                    <label for="importe" class="form-label">Importe (€)</label>
                    <input type="number" step="0.01" class="form-control" th:classappend="${#fields.hasErrors('importe')} ? 'is-invalid'"
                           id="importe" th:field="*{importe}" min="0.01">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('importe')}" th:errors="*{importe}"></div>
                </div>

                <div class="col-md-6">
                    <label for="metodoPago" class="form-label">Metodo de Pago</label>
                    <select class="form-select" id="metodoPago" th:field="*{metodoPago}">
                        <option value="">-- Seleccionar --</option>
                        <option th:each="m : ${metodosPago}" th:value="${m}"
                                th:text="${m == 'tarjeta_credito' ? 'Tarjeta de credito' :
                                          (m == 'tarjeta_debito' ? 'Tarjeta de debito' : 'PayPal')}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label for="estadoPago" class="form-label">Estado del Pago</label>
                    <select class="form-select" id="estadoPago" th:field="*{estadoPago}">
                        <option value="realizado"  th:selected="${pago.estadoPago == 'realizado'}">✅ Realizado</option>
                        <option value="reembolsado" th:selected="${pago.estadoPago == 'reembolsado'}">↩ Reembolsado</option>
                    </select>
                </div>

                <div class="col-12 d-flex gap-2 pt-2">
                    <button type="submit" class="btn btn-teal-lg"><i class="bi bi-save me-1"></i>Guardar</button>
                    <a th:href="@{/pagos}" class="btn btn-outline-secondary" style="border-radius:10px;padding:.65rem 1.25rem;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
