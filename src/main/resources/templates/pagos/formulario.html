<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Pago')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1 th:text="${pago.id != null ? 'Editar Pago' : 'Nuevo Pago'}">Formulario</h1>
        <hr>
        <form th:action="@{/pagos/guardar}" th:object="${pago}" method="post" class="row g-3" novalidate>
            <input type="hidden" th:field="*{id}">

            <!-- Reserva -->
            <div class="col-md-6">
                <label for="reserva" class="form-label">Reserva</label>
                <select class="form-select" id="reserva" th:field="*{reserva.id}" required>
                    <option value="">-- Seleccionar reserva --</option>
                    <option th:each="r : ${reservas}" th:value="${r.id}"
                            th:text="'#' + ${r.id} + ' - ' + ${r.usuario.nombre} + ' - ' + ${r.vehiculo.modelo.nombre}"></option>
                </select>
            </div>

            <!-- Fecha Pago -->
            <div class="col-md-3">
                <label for="fechaPago" class="form-label">Fecha de Pago</label>
                <input type="date" class="form-control"
                       th:classappend="${#fields.hasErrors('fechaPago')} ? 'is-invalid'"
                       id="fechaPago" th:field="*{fechaPago}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaPago')}" th:errors="*{fechaPago}"></div>
            </div>

            <!-- Importe -->
            <div class="col-md-3">
                <label for="importe" class="form-label">Importe (€)</label>
                <input type="number" step="0.01" class="form-control"
                       th:classappend="${#fields.hasErrors('importe')} ? 'is-invalid'"
                       id="importe" th:field="*{importe}" min="0.01">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('importe')}" th:errors="*{importe}"></div>
            </div>

            <!-- Metodo Pago -->
            <div class="col-md-6">
                <label for="metodoPago" class="form-label">Metodo de Pago</label>
                <select class="form-select" id="metodoPago" th:field="*{metodoPago}">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="m : ${metodosPago}" th:value="${m}" th:text="${m}"></option>
                </select>
            </div>

            <!-- Estado Pago -->
            <div class="col-md-6">
                <label for="estadoPago" class="form-label">Estado del Pago</label>
                <select class="form-select" id="estadoPago" th:field="*{estadoPago}">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="e : ${estadosPago}" th:value="${e}" th:text="${e}"></option>
                </select>
            </div>

            <!-- Botones -->
            <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
                <a th:href="@{/pagos}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
