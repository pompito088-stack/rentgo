<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Detalle Vehiculo')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1 th:text="${vehiculo.modelo.marca.nombre + ' ' + vehiculo.modelo.nombre}">Vehiculo</h1>
        <hr>
        <div class="row">
            <div class="col-md-5">
                <img th:if="${vehiculo.rutaFoto != null}" th:src="@{${vehiculo.rutaFoto}}"
                     class="img-fluid rounded" alt="Foto vehiculo">
                <div th:if="${vehiculo.rutaFoto == null}"
                     class="bg-secondary text-white d-flex align-items-center justify-content-center rounded"
                     style="height:300px;">
                    <i class="bi bi-car-front" style="font-size:5rem;"></i>
                </div>
            </div>
            <div class="col-md-7">
                <table class="table">
                    <tr><th>Matricula</th><td th:text="${vehiculo.matricula}"></td></tr>
                    <tr><th>Marca</th><td th:text="${vehiculo.modelo.marca.nombre}"></td></tr>
                    <tr><th>Modelo</th><td th:text="${vehiculo.modelo.nombre}"></td></tr>
                    <tr><th>Categoria</th><td th:text="${vehiculo.categoriaVehiculo.nombre}"></td></tr>
                    <tr><th>Anio</th><td th:text="${vehiculo.anio}"></td></tr>
                    <tr><th>Color</th><td th:text="${vehiculo.color}"></td></tr>
                    <tr><th>Plazas</th><td th:text="${vehiculo.plazas}"></td></tr>
                    <tr><th>Puertas</th><td th:text="${vehiculo.puertas}"></td></tr>
                    <tr><th>Etiqueta</th><td th:text="${vehiculo.etiqueta}"></td></tr>
                    <tr><th>Transmision</th><td th:text="${vehiculo.transmision}"></td></tr>
                    <tr><th>Combustion</th><td th:text="${vehiculo.combustion}"></td></tr>
                    <tr><th>Kilometraje</th><td th:text="${vehiculo.kilometraje + ' km'}"></td></tr>
                    <tr><th>Precio / dia</th><td th:text="${vehiculo.precioDia + ' €'}"></td></tr>
                    <tr><th>Sucursal</th><td th:text="${vehiculo.sucursal.nombre + ' (' + vehiculo.sucursal.ciudad + ')'}"></td></tr>
                </table>
                <div th:if="${!vehiculo.extras.isEmpty()}">
                    <h5>Extras incluidos</h5>
                    <span th:each="extra : ${vehiculo.extras}" class="badge bg-success me-1" th:text="${extra.nombre}"></span>
                </div>
                <div class="mt-3">
                    <a th:href="@{/vehiculos}" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
                    <a th:href="@{/reservas/nuevo}" class="btn btn-primary"><i class="bi bi-calendar-plus me-1"></i>Reservar</a>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
