<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Tipo Usuario')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1 th:text="${tipoUsuario.id != null ? 'Editar Tipo de Usuario' : 'Nuevo Tipo de Usuario'}">Formulario</h1>
        <hr>
        <form th:action="@{/tipo-usuarios/guardar}" th:object="${tipoUsuario}" method="post" class="row g-3">
            <input type="hidden" th:field="*{id}">
            <div class="col-md-6">
                <label for="nombre" class="form-label">Nombre del Tipo</label>
                <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
                <a th:href="@{/tipo-usuarios}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
