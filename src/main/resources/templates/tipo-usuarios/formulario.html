<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Tipo Usuario', null)}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title">
            <i class="bi bi-shield-check me-2" style="color:var(--teal-600)"></i>
            <span th:text="${tipoUsuario.id != null ? 'Editar Tipo de Usuario' : 'Nuevo Tipo de Usuario'}">Formulario</span>
        </h1>
        <div class="topbar-right">
            <a th:href="@{/tipo-usuarios}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
    </header>
    <main class="admin-page-content">
        <div class="admin-card">
            <form th:action="@{/tipo-usuarios/guardar}" th:object="${tipoUsuario}" method="post" class="row g-3" novalidate>
                <input type="hidden" th:field="*{id}">
                <div class="col-md-6">
                    <label for="nombre" class="form-label">Nombre del Tipo</label>
                    <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                </div>
                <div class="col-12 d-flex gap-2 pt-2">
                    <button type="submit" class="btn btn-teal-lg"><i class="bi bi-save me-1"></i>Guardar</button>
                    <a th:href="@{/tipo-usuarios}" class="btn btn-outline-secondary" style="border-radius:10px;padding:.65rem 1.25rem;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
