<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Tipos de Usuario')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1>Tipos de Usuario</h1>
        <a th:href="@{/tipo-usuarios/nuevo}" class="btn btn-success mb-3"><i class="bi bi-plus-circle me-1"></i>Nuevo Tipo</a>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tipo : ${tiposUsuario}">
                    <td th:text="${tipo.id}"></td>
                    <td th:text="${tipo.nombre}"></td>
                    <td>
                        <a th:href="@{/tipo-usuarios/editar/{id}(id=${tipo.id})}" class="btn-action-edit">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a th:href="@{/tipo-usuarios/eliminar/{id}(id=${tipo.id})}" class="btn-action-delete"
                           onclick="return confirm('Estas seguro de eliminar este tipo?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(tiposUsuario)}">
                    <td colspan="3" class="text-center">No hay tipos de usuario registrados.</td>
                </tr>
            </tbody>
        </table>
    </section>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
