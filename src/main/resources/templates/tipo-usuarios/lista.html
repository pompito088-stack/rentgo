<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Tipos de Usuario')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title"><i class="bi bi-shield-check me-2" style="color:var(--teal-600)"></i>Tipos de Usuario</h1>
        <div class="topbar-right">
            <a th:href="@{/tipo-usuarios/nuevo}" class="btn btn-teal btn-sm"><i class="bi bi-plus-lg me-1"></i>Nuevo Tipo</a>
        </div>
    </header>
    <main class="admin-page-content">
        <section class="admin-table" aria-label="Tabla de tipos de usuario">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tipo : ${tiposUsuario}">
                        <td><span class="badge" style="background:var(--teal-100);color:var(--teal-700);font-weight:700;" th:text="${tipo.id}"></span></td>
                        <td class="fw-500" th:text="${tipo.nombre}"></td>
                        <td class="text-end">
                            <div class="d-inline-flex gap-1">
                                <a th:href="@{/tipo-usuarios/editar/{id}(id=${tipo.id})}" class="btn-action-edit">
                                    <i class="bi bi-pencil me-1"></i>Editar
                                </a>
                                <a th:href="@{/tipo-usuarios/eliminar/{id}(id=${tipo.id})}" class="btn-action-delete"
                                   onclick="return confirm('¿Eliminar este tipo?')">
                                    <i class="bi bi-trash me-1"></i>Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tiposUsuario)}">
                        <td colspan="3" class="text-center text-muted py-4">No hay tipos de usuario registrados.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
