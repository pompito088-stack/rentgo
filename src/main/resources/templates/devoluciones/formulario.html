<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Devolucion', null)}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title">
            <i class="bi bi-arrow-return-left me-2" style="color:var(--teal-600)"></i>
            <span th:text="${devolucion.id != null ? 'Editar Devolucion' : 'Nueva Devolucion'}">Formulario</span>
        </h1>
        <div class="topbar-right">
            <a th:href="@{/devoluciones}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
        </div>
    </header>
    <main class="admin-page-content">
        <div class="admin-card">

            <!-- Aviso informativo -->
            <div class="alert alert-info d-flex align-items-start gap-2 mb-4" role="alert" style="border-radius:10px;font-size:.9rem;">
                <i class="bi bi-info-circle-fill mt-1"></i>
                <div>
                    Al guardar, el pago asociado cambiara automaticamente su estado a
                    <strong>Reembolsado</strong>.<br>
                    Si eliminas la devolucion, el pago volvera a <strong>Realizado</strong>.
                </div>
            </div>

            <form th:action="@{/devoluciones/guardar}" th:object="${devolucion}" method="post" class="row g-3" novalidate>
                <input type="hidden" th:field="*{id}">

                <!-- Pago asociado -->
                <div class="col-md-6">
                    <label for="pago" class="form-label">Pago a reembolsar</label>
                    <select class="form-select" id="pago" th:field="*{pago.id}" required>
                        <option value="">-- Seleccionar pago --</option>
                        <option th:each="p : ${pagosReembolsables}"
                                th:value="${p.id}"
                                th:text="'Pago #' + ${p.id} + '  |  Reserva #' + ${p.reserva.id}
                                         + '  —  ' + ${p.reserva.usuario.nombre} + ' ' + ${p.reserva.usuario.apellidos}
                                         + '  (' + ${#numbers.formatDecimal(p.importe, 1, 2)} + ' €)'">
                        </option>
                    </select>
                    <div class="form-text text-muted">Solo se muestran pagos sin devolucion previa.</div>
                </div>

                <!-- Fecha de devolucion -->
                <div class="col-md-3">
                    <label for="fechaDevolucion" class="form-label">Fecha de devolucion</label>
                    <input type="date" class="form-control"
                           th:classappend="${#fields.hasErrors('fechaDevolucion')} ? 'is-invalid'"
                           id="fechaDevolucion" th:field="*{fechaDevolucion}" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaDevolucion')}"
                         th:errors="*{fechaDevolucion}"></div>
                </div>

                <!-- Importe reembolsado -->
                <div class="col-md-3">
                    <label for="importeReembolsado" class="form-label">Importe reembolsado (€)</label>
                    <input type="number" step="0.01" class="form-control"
                           th:classappend="${#fields.hasErrors('importeReembolsado')} ? 'is-invalid'"
                           id="importeReembolsado" th:field="*{importeReembolsado}" min="0.01">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('importeReembolsado')}"
                         th:errors="*{importeReembolsado}"></div>
                </div>

                <!-- Motivo -->
                <div class="col-12">
                    <label for="motivo" class="form-label">Motivo del reembolso <span class="text-muted">(opcional)</span></label>
                    <textarea class="form-control"
                              th:classappend="${#fields.hasErrors('motivo')} ? 'is-invalid'"
                              id="motivo" th:field="*{motivo}" rows="3"
                              placeholder="Ej: Cancelacion solicitada por el cliente antes del inicio del alquiler."></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('motivo')}" th:errors="*{motivo}"></div>
                </div>

                <div class="col-12 d-flex gap-2 pt-2">
                    <button type="submit" class="btn btn-teal-lg">
                        <i class="bi bi-save me-1"></i>Guardar devolucion
                    </button>
                    <a th:href="@{/devoluciones}" class="btn btn-outline-secondary"
                       style="border-radius:10px;padding:.65rem 1.25rem;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
