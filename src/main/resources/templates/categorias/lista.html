<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Categorias')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title"><i class="bi bi-grid-3x3-gap me-2" style="color:var(--teal-600)"></i>Categorias de Vehiculos</h1>
        <div class="topbar-right">
            <a th:href="@{/categorias/nuevo}" class="btn btn-teal btn-sm"><i class="bi bi-plus-lg me-1"></i>Nueva Categoria</a>
        </div>
    </header>
    <main class="admin-page-content">
        <!-- Barra de búsqueda -->
        <div class="admin-card p-3 mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-6">
                    <label class="form-label mb-1" style="font-size:.78rem;font-weight:600;color:#6b7280;"><i class="bi bi-search me-1"></i>Buscar categoría</label>
                    <input type="text" id="buscarCat" class="form-control form-control-sm" placeholder="Nombre o descripción..." oninput="filtrarCats()">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="document.getElementById('buscarCat').value='';filtrarCats()">
                        <i class="bi bi-x-circle me-1"></i>Limpiar
                    </button>
                </div>
                <div class="col-md-4 text-end">
                    <small class="text-muted"><span id="contCats">0</span> categoría(s)</small>
                </div>
            </div>
        </div>
        <section class="admin-table">
            <table class="table table-hover mb-0" id="tablaCats">
                <thead>
                    <tr><th>#</th><th>Nombre</th><th>Descripción</th><th class="text-end">Acciones</th></tr>
                </thead>
                <tbody>
                    <tr th:each="cat : ${categorias}">
                        <td><span class="badge" style="background:var(--teal-100);color:var(--teal-700);font-weight:700;" th:text="${cat.id}"></span></td>
                        <td class="fw-500" th:text="${cat.nombre}"></td>
                        <td style="color:#6b7280;font-size:.88rem;" th:text="${cat.descripcion}"></td>
                        <td class="text-end">
                            <div class="d-inline-flex gap-1">
                                <a th:href="@{/categorias/editar/{id}(id=${cat.id})}" class="btn-action-edit"><i class="bi bi-pencil me-1"></i>Editar</a>
                                <a th:href="@{/categorias/eliminar/{id}(id=${cat.id})}" class="btn-action-delete"
                                   onclick="return confirm('¿Eliminar esta categoría?')"><i class="bi bi-trash me-1"></i>Eliminar</a>
                            </div>
                        </td>
                    </tr>
                    <tr id="sinResultadosCats" class="d-none">
                        <td colspan="4" class="text-center text-muted py-4"><i class="bi bi-search me-2"></i>Sin resultados.</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td colspan="4" class="text-center text-muted py-4">No hay categorias registradas.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    function filtrarCats() {
        var texto = (document.getElementById('buscarCat').value || '').toLowerCase();
        var filas = Array.from(document.querySelectorAll('#tablaCats tbody tr')).filter(function(r){ return !r.id; });
        var visibles = 0;
        filas.forEach(function(fila) {
            var cumple = !texto || fila.textContent.toLowerCase().includes(texto);
            fila.classList.toggle('d-none', !cumple);
            if (cumple) visibles++;
        });
        document.getElementById('contCats').textContent = visibles;
        document.getElementById('sinResultadosCats').classList.toggle('d-none', visibles > 0);
    }
    document.addEventListener('DOMContentLoaded', filtrarCats);
</script>
</body>
</html>
