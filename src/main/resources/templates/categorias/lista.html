<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Categorias')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title"><i class="bi bi-grid-3x3-gap me-2" style="color:var(--teal-600)"></i>Categorias de Vehiculos</h1>
        <div class="topbar-right">
            <a th:href="@{/categorias/nuevo}" class="btn btn-teal btn-sm"><i class="bi bi-plus-lg me-1"></i>Nueva Categoria</a>
        </div>
    </header>
    <main class="admin-page-content">
        <section class="admin-table">
            <table class="table table-hover mb-0">
                <thead>
                    <tr><th>ID</th><th>Nombre</th><th>Descripcion</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                    <tr th:each="cat : ${categorias}">
                        <td th:text="${cat.id}"></td>
                        <td class="fw-500" th:text="${cat.nombre}"></td>
                        <td th:text="${cat.descripcion}"></td>
                        <td>
                            <a th:href="@{/categorias/editar/{id}(id=${cat.id})}" class="btn btn-warning btn-sm me-1"><i class="bi bi-pencil"></i></a>
                            <a th:href="@{/categorias/eliminar/{id}(id=${cat.id})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar esta categoria?')"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td colspan="4" class="text-center text-muted py-4">No hay categorias registradas.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
