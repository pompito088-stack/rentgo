<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ============ FRAGMENT: HEAD (CSS + meta) ============ -->
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RentGo - Sistema de alquiler de vehiculos.">
    <title th:text="${titulo}">RentGo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
        .navbar-brand i { font-size: 1.4rem; }
    </style>
</head>

<body>

<!-- ============ FRAGMENT: NAVBAR ADMIN ============ -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-car-front-fill me-2"></i>RentGo
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- ===== Links para ADMIN ===== -->
            <ul class="navbar-nav me-auto"
                th:if="${session.usuarioLogueado != null and session.usuarioLogueado.admin}">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/vehiculos}"><i class="bi bi-car-front me-1"></i>Vehiculos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuarios}"><i class="bi bi-people me-1"></i>Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/tipo-usuarios}"><i class="bi bi-tags me-1"></i>Tipos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reservas}"><i class="bi bi-calendar-check me-1"></i>Reservas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/extras}"><i class="bi bi-stars me-1"></i>Extras</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/sucursales}"><i class="bi bi-building me-1"></i>Sucursales</a>
                </li>
            </ul>

            <!-- ===== Links para CLIENTE ===== -->
            <ul class="navbar-nav me-auto"
                th:if="${session.usuarioLogueado != null and !session.usuarioLogueado.admin}">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/vehiculos}"><i class="bi bi-car-front me-1"></i>Vehiculos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reservas}"><i class="bi bi-calendar-check me-1"></i>Mis Reservas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/extras}"><i class="bi bi-stars me-1"></i>Extras</a>
                </li>
            </ul>

            <!-- ===== Info usuario + Logout ===== -->
            <ul class="navbar-nav" th:if="${session.usuarioLogueado != null}">
                <li class="nav-item">
                    <a class="nav-link text-light" th:href="@{/mi-perfil}" title="Ver mi perfil">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${session.usuarioLogueado.nombre}"></span>
                        <span class="badge bg-primary ms-1"
                              th:text="${session.usuarioLogueado.admin ? 'Admin' : 'Cliente'}"></span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-1"></i>Salir</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ============ FRAGMENT: FOOTER ============ -->
<footer th:fragment="footer" class="bg-dark text-white text-center py-3 mt-4">
    <div class="container">
        <p class="mb-0">&copy; 2026 RentGo - Sistema de Alquiler de Vehiculos</p>
    </div>
</footer>

<!-- ============ FRAGMENT: SCRIPTS ============ -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>

</body>
</html>
