<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Mantenimientos')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1>Mantenimientos</h1>
        <a th:href="@{/mantenimientos/nuevo}" class="btn btn-success mb-3"><i class="bi bi-plus-circle me-1"></i>Nuevo Mantenimiento</a>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Vehiculo</th>
                    <th>Motivo</th>
                    <th>Fecha Inicio</th>
                    <th>Fecha Fin</th>
                    <th>Coste</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${mantenimientos}">
                    <td th:text="${m.id}"></td>
                    <td th:text="${m.vehiculo.modelo.marca.nombre + ' ' + m.vehiculo.modelo.nombre + ' (' + m.vehiculo.matricula + ')'}"></td>
                    <td th:text="${m.motivo}"></td>
                    <td th:text="${m.fechaInicio}"></td>
                    <td th:text="${m.fechaFin}"></td>
                    <td th:text="${m.coste + ' €'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${m.estado == 'finalizado'} ? 'bg-success' :
                                              (${m.estado == 'pendiente'} ? 'bg-warning text-dark' : 'bg-info')"
                              th:text="${m.estado}"></span>
                    </td>
                    <td>
                        <a th:href="@{/mantenimientos/editar/{id}(id=${m.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a th:href="@{/mantenimientos/eliminar/{id}(id=${m.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Estas seguro de eliminar este mantenimiento?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(mantenimientos)}">
                    <td colspan="8" class="text-center">No hay mantenimientos registrados.</td>
                </tr>
            </tbody>
        </table>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
