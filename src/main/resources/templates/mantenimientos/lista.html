<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Mantenimientos')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title"><i class="bi bi-wrench-adjustable me-2" style="color:var(--teal-600)"></i>Mantenimientos</h1>
        <div class="topbar-right">
            <a th:href="@{/mantenimientos/nuevo}" class="btn btn-teal btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Nuevo Mantenimiento
            </a>
        </div>
    </header>
    <main class="admin-page-content">
        <!-- Barra de búsqueda -->
        <div class="admin-card p-3 mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label mb-1" style="font-size:.78rem;font-weight:600;color:#6b7280;"><i class="bi bi-search me-1"></i>Buscar</label>
                    <input type="text" id="buscarMant" class="form-control form-control-sm" placeholder="Vehículo, motivo..." oninput="filtrarMant()">
                </div>
                <div class="col-md-3">
                    <label class="form-label mb-1" style="font-size:.78rem;font-weight:600;color:#6b7280;"><i class="bi bi-flag me-1"></i>Estado</label>
                    <select id="filtroEstadoMant" class="form-select form-select-sm" onchange="filtrarMant()">
                        <option value="">Todos</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="en_curso">En curso</option>
                        <option value="finalizado">Finalizado</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="document.getElementById('buscarMant').value='';document.getElementById('filtroEstadoMant').value='';filtrarMant()">
                        <i class="bi bi-x-circle me-1"></i>Limpiar
                    </button>
                </div>
                <div class="col-md-3 text-end">
                    <small class="text-muted"><span id="contMant">0</span> mantenimiento(s)</small>
                </div>
            </div>
        </div>
        <section class="admin-table">
            <table class="table table-hover mb-0" id="tablaMant">
                <thead>
                    <tr>
                        <th>#</th><th>Vehículo</th><th>Motivo</th><th>Fecha Inicio</th><th>Fecha Fin</th><th><i class="bi bi-currency-euro me-1"></i>Coste</th><th>Estado</th><th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${mantenimientos}" th:attr="data-estado=${m.estado}">
                        <td><span class="badge" style="background:var(--teal-100);color:var(--teal-700);font-weight:700;" th:text="${m.id}"></span></td>
                        <td>
                            <div style="font-weight:600;font-size:.88rem;" th:text="${m.vehiculo.modelo.marca.nombre + ' ' + m.vehiculo.modelo.nombre}"></div>
                            <div style="font-size:.75rem;color:#9ca3af;" th:text="${m.vehiculo.matricula}"></div>
                        </td>
                        <td style="color:#6b7280;font-size:.88rem;" th:text="${m.motivo}"></td>
                        <td>
                            <div th:text="${m.fechaInicio}"></div>
                            <small class="text-muted" th:text="${m.horaInicio + ' h'}"></small>
                        </td>
                        <td>
                            <div th:text="${m.fechaFin}"></div>
                            <small class="text-muted" th:text="${m.horaFin + ' h'}"></small>
                        </td>
                        <td style="font-weight:700;color:var(--teal-700);" th:text="${#numbers.formatDecimal(m.coste, 1, 2)} + ' €'"></td>
                        <td>
                            <span class="badge rounded-pill"
                                  style="font-size:.78rem;padding:.35em .75em;"
                                  th:classappend="${m.estado == 'finalizado'} ? 'bg-success' :
                                                  (${m.estado == 'pendiente'} ? 'bg-warning text-dark' : 'bg-info')"
                                  th:text="${m.estado == 'finalizado'} ? 'Finalizado' :
                                           (${m.estado == 'pendiente'} ? 'Pendiente' :
                                           (${m.estado == 'en_proceso'} ? 'En proceso' : ${m.estado}))"></span>
                        </td>
                        <td class="text-end">
                            <div class="d-inline-flex gap-1">
                                <a th:href="@{/mantenimientos/editar/{id}(id=${m.id})}" class="btn-action-edit">
                                    <i class="bi bi-pencil me-1"></i>Editar
                                </a>
                                <a th:href="@{/mantenimientos/eliminar/{id}(id=${m.id})}" class="btn-action-delete"
                                   onclick="return confirm('¿Eliminar este mantenimiento?')">
                                    <i class="bi bi-trash me-1"></i>Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr id="sinResultadosMant" class="d-none">
                        <td colspan="8" class="text-center text-muted py-4"><i class="bi bi-search me-2"></i>Sin resultados.</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(mantenimientos)}">
                        <td colspan="8" class="text-center text-muted py-4">No hay mantenimientos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    function filtrarMant() {
        var texto = (document.getElementById('buscarMant').value || '').toLowerCase();
        var estado = (document.getElementById('filtroEstadoMant').value || '').toLowerCase();
        var filas = document.querySelectorAll('#tablaMant tbody tr[data-estado]');
        var visibles = 0;
        filas.forEach(function(fila) {
            var cumple = (!texto || fila.textContent.toLowerCase().includes(texto))
                      && (!estado || (fila.dataset.estado || '').toLowerCase() === estado);
            fila.classList.toggle('d-none', !cumple);
            if (cumple) visibles++;
        });
        document.getElementById('contMant').textContent = visibles;
        document.getElementById('sinResultadosMant').classList.toggle('d-none', visibles > 0);
    }
    document.addEventListener('DOMContentLoaded', filtrarMant);
</script>
</body>
</html>
