<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Mantenimientos')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title"><i class="bi bi-wrench-adjustable me-2" style="color:var(--teal-600)"></i>Mantenimientos</h1>
        <div class="topbar-right">
            <a th:href="@{/mantenimientos/nuevo}" class="btn btn-teal btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Nuevo Mantenimiento
            </a>
        </div>
    </header>
    <main class="admin-page-content">
        <section class="admin-table">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>ID</th><th>Vehiculo</th><th>Motivo</th><th>Fecha Inicio</th><th>Fecha Fin</th><th>Coste</th><th>Estado</th><th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${mantenimientos}">
                        <td th:text="${m.id}"></td>
                        <td th:text="${m.vehiculo.modelo.marca.nombre + ' ' + m.vehiculo.modelo.nombre + ' (' + m.vehiculo.matricula + ')'}"></td>
                        <td th:text="${m.motivo}"></td>
                        <td th:text="${m.fechaInicio}"></td>
                        <td th:text="${m.fechaFin}"></td>
                        <td th:text="${m.coste + ' €'}"></td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${m.estado == 'finalizado'} ? 'bg-success' :
                                                  (${m.estado == 'pendiente'} ? 'bg-warning text-dark' : 'bg-info')"
                                  th:text="${m.estado}"></span>
                        </td>
                        <td>
                            <a th:href="@{/mantenimientos/editar/{id}(id=${m.id})}" class="btn btn-warning btn-sm me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/mantenimientos/eliminar/{id}(id=${m.id})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar este mantenimiento?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(mantenimientos)}">
                        <td colspan="8" class="text-center text-muted py-4">No hay mantenimientos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
