<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Mantenimiento')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title">
            <i class="bi bi-wrench-adjustable me-2" style="color:var(--teal-600)"></i>
            <span th:text="${mantenimiento.id != null ? 'Editar Mantenimiento' : 'Nuevo Mantenimiento'}">Formulario</span>
        </h1>
        <div class="topbar-right">
            <a th:href="@{/mantenimientos}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
    </header>
    <main class="admin-page-content">
        <div class="admin-card">
            <form th:action="@{/mantenimientos/guardar}" th:object="${mantenimiento}" method="post" class="row g-3" novalidate>
                <input type="hidden" th:field="*{id}">
                <div class="col-md-6">
                    <label for="vehiculo" class="form-label">Vehiculo</label>
                    <select class="form-select" id="vehiculo" th:field="*{vehiculo.id}" required>
                        <option value="">-- Seleccionar vehiculo --</option>
                        <option th:each="v : ${vehiculos}" th:value="${v.id}"
                                th:text="${v.modelo.marca.nombre + ' ' + v.modelo.nombre + ' (' + v.matricula + ')'}"></option>
                    </select>
                </div>
                <!-- Estado: solo visible al editar un mantenimiento existente -->
                <div class="col-md-6" th:if="${mantenimiento.id != null}">
                    <label class="form-label">Estado actual</label>
                    <div class="form-control bg-light d-flex align-items-center gap-2">
                        <span th:with="est=${mantenimiento.calcularEstadoPorFecha()}">
                            <span th:if="${est == 'pendiente'}" class="badge bg-warning text-dark">Pendiente</span>
                            <span th:if="${est == 'en_proceso'}" class="badge bg-primary">En proceso</span>
                            <span th:if="${est == 'finalizado'}" class="badge bg-success">Finalizado</span>
                        </span>
                        <small class="text-muted">(calculado automáticamente por fechas)</small>
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="fechaInicio" class="form-label">Fecha Inicio</label>
                    <input type="date" class="form-control" th:classappend="${#fields.hasErrors('fechaInicio')} ? 'is-invalid'"
                           id="fechaInicio" th:field="*{fechaInicio}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></div>
                </div>
                <div class="col-md-3">
                    <label for="fechaFin" class="form-label">Fecha Fin</label>
                    <input type="date" class="form-control" th:classappend="${#fields.hasErrors('fechaFin')} ? 'is-invalid'"
                           id="fechaFin" th:field="*{fechaFin}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}"></div>
                </div>
                <div class="col-md-3">
                    <label for="coste" class="form-label">Coste (€)</label>
                    <input type="number" step="0.01" class="form-control" th:classappend="${#fields.hasErrors('coste')} ? 'is-invalid'"
                           id="coste" th:field="*{coste}" min="0">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('coste')}" th:errors="*{coste}"></div>
                </div>
                <div class="col-md-12">
                    <label for="motivo" class="form-label">Motivo</label>
                    <input type="text" class="form-control" th:classappend="${#fields.hasErrors('motivo')} ? 'is-invalid'"
                           id="motivo" th:field="*{motivo}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('motivo')}" th:errors="*{motivo}"></div>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-teal"><i class="bi bi-save me-1"></i>Guardar</button>
                    <a th:href="@{/mantenimientos}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
