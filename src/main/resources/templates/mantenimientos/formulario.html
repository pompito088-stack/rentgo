<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Mantenimiento')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1 th:text="${mantenimiento.id != null ? 'Editar Mantenimiento' : 'Nuevo Mantenimiento'}">Formulario</h1>
        <hr>
        <form th:action="@{/mantenimientos/guardar}" th:object="${mantenimiento}" method="post" class="row g-3" novalidate>
            <input type="hidden" th:field="*{id}">

            <!-- Vehiculo -->
            <div class="col-md-6">
                <label for="vehiculo" class="form-label">Vehiculo</label>
                <select class="form-select" id="vehiculo" th:field="*{vehiculo.id}" required>
                    <option value="">-- Seleccionar vehiculo --</option>
                    <option th:each="v : ${vehiculos}" th:value="${v.id}"
                            th:text="${v.modelo.marca.nombre + ' ' + v.modelo.nombre + ' (' + v.matricula + ')'}"></option>
                </select>
            </div>

            <!-- Estado -->
            <div class="col-md-6">
                <label for="estado" class="form-label">Estado</label>
                <select class="form-select" id="estado" th:field="*{estado}">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                </select>
            </div>

            <!-- Fecha Inicio -->
            <div class="col-md-3">
                <label for="fechaInicio" class="form-label">Fecha Inicio</label>
                <input type="date" class="form-control"
                       th:classappend="${#fields.hasErrors('fechaInicio')} ? 'is-invalid'"
                       id="fechaInicio" th:field="*{fechaInicio}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></div>
            </div>

            <!-- Fecha Fin -->
            <div class="col-md-3">
                <label for="fechaFin" class="form-label">Fecha Fin</label>
                <input type="date" class="form-control"
                       th:classappend="${#fields.hasErrors('fechaFin')} ? 'is-invalid'"
                       id="fechaFin" th:field="*{fechaFin}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}"></div>
            </div>

            <!-- Coste -->
            <div class="col-md-3">
                <label for="coste" class="form-label">Coste (€)</label>
                <input type="number" step="0.01" class="form-control"
                       th:classappend="${#fields.hasErrors('coste')} ? 'is-invalid'"
                       id="coste" th:field="*{coste}" min="0">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('coste')}" th:errors="*{coste}"></div>
            </div>

            <!-- Motivo -->
            <div class="col-md-12">
                <label for="motivo" class="form-label">Motivo</label>
                <input type="text" class="form-control"
                       th:classappend="${#fields.hasErrors('motivo')} ? 'is-invalid'"
                       id="motivo" th:field="*{motivo}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('motivo')}" th:errors="*{motivo}"></div>
            </div>

            <!-- Botones -->
            <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
                <a th:href="@{/mantenimientos}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
