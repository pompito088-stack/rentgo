<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Mantenimiento', null)}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title">
            <i class="bi bi-wrench-adjustable me-2" style="color:var(--teal-600)"></i>
            <span th:text="${mantenimiento.id != null ? 'Editar Mantenimiento' : 'Nuevo Mantenimiento'}">Formulario</span>
        </h1>
        <div class="topbar-right">
            <a th:href="@{/mantenimientos}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
    </header>
    <main class="admin-page-content">
        <div class="admin-card">
            <form th:action="@{/mantenimientos/guardar}" th:object="${mantenimiento}" method="post" class="row g-3" novalidate>
                <input type="hidden" th:field="*{id}">
                <div class="col-md-6">
                    <label for="vehiculo" class="form-label">Vehiculo</label>
                    <select class="form-select" id="vehiculo" th:field="*{vehiculo.id}" required>
                        <option value="">-- Seleccionar vehiculo --</option>
                        <option th:each="v : ${vehiculos}" th:value="${v.id}"
                                th:text="${v.modelo.marca.nombre + ' ' + v.modelo.nombre + ' (' + v.matricula + ')'}"></option>
                    </select>
                </div>
                <!-- Estado: solo visible al editar un mantenimiento existente -->
                <div class="col-md-6" th:if="${mantenimiento.id != null}">
                    <label class="form-label">Estado actual</label>
                    <div class="form-control bg-light d-flex align-items-center gap-2">
                        <span th:with="est=${mantenimiento.calcularEstadoPorFecha()}">
                            <span th:if="${est == 'pendiente'}" class="badge bg-warning text-dark">Pendiente</span>
                            <span th:if="${est == 'en_proceso'}" class="badge bg-primary">En proceso</span>
                            <span th:if="${est == 'finalizado'}" class="badge bg-success">Finalizado</span>
                        </span>
                        <small class="text-muted">(calculado automaticamente por fechas)</small>
                    </div>
                </div>
                <!-- Fecha Inicio -->
                <div class="col-md-3">
                    <label for="fechaInicio" class="form-label">Fecha Inicio</label>
                    <input type="date" class="form-control" th:classappend="${#fields.hasErrors('fechaInicio')} ? 'is-invalid'"
                           id="fechaInicio" th:field="*{fechaInicio}"
                           th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></div>
                </div>
                <!-- Hora Inicio -->
                <div class="col-md-3">
                    <label for="horaInicio" class="form-label">Hora Inicio</label>
                    <input type="time" class="form-control" id="horaInicio" name="horaInicio"
                           th:value="${mantenimiento.horaInicio != null ? mantenimiento.horaInicio : '09:00'}" required>
                </div>
                <!-- Fecha Fin -->
                <div class="col-md-3">
                    <label for="fechaFin" class="form-label">Fecha Fin</label>
                    <input type="date" class="form-control" th:classappend="${#fields.hasErrors('fechaFin')} ? 'is-invalid'"
                           id="fechaFin" th:field="*{fechaFin}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}"></div>
                </div>
                <!-- Hora Fin -->
                <div class="col-md-3">
                    <label for="horaFin" class="form-label">Hora Fin</label>
                    <input type="time" class="form-control" id="horaFin" name="horaFin"
                           th:value="${mantenimiento.horaFin != null ? mantenimiento.horaFin : '18:00'}" required>
                </div>
                <!-- Aviso mismo dia -->
                <div class="col-12 d-none" id="avisoMismoDia">
                    <div class="alert alert-warning d-flex align-items-center gap-2 py-2 mb-0" role="alert" style="border-radius:10px;font-size:.85rem;">
                        <i class="bi bi-exclamation-triangle-fill text-warning"></i>
                        <span id="avisoMismoDiaMensaje"></span>
                    </div>
                </div>
                <div class="col-md-3">
                    <label for="coste" class="form-label">Coste (€)</label>
                    <input type="number" step="0.01" class="form-control" th:classappend="${#fields.hasErrors('coste')} ? 'is-invalid'"
                           id="coste" th:field="*{coste}" min="0">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('coste')}" th:errors="*{coste}"></div>
                </div>
                <div class="col-md-12">
                    <label for="motivo" class="form-label">Motivo</label>
                    <input type="text" class="form-control" th:classappend="${#fields.hasErrors('motivo')} ? 'is-invalid'"
                           id="motivo" th:field="*{motivo}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('motivo')}" th:errors="*{motivo}"></div>
                </div>
                <div class="col-12 d-flex gap-2 pt-2">
                    <button type="submit" class="btn btn-teal-lg"><i class="bi bi-save me-1"></i>Guardar</button>
                    <a th:href="@{/mantenimientos}" class="btn btn-outline-secondary" style="border-radius:10px;padding:.65rem 1.25rem;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    (function () {
        var fi = document.getElementById('fechaInicio');
        var ff = document.getElementById('fechaFin');
        var hi = document.getElementById('horaInicio');
        var hf = document.getElementById('horaFin');
        var aviso = document.getElementById('avisoMismoDia');
        var avisoMsg = document.getElementById('avisoMismoDiaMensaje');

        // Helpers para obtener fecha y hora actuales en formato HH:MM / YYYY-MM-DD
        function hoy() {
            var d = new Date();
            return d.toISOString().slice(0, 10);
        }
        function horaActual() {
            var d = new Date();
            return d.toTimeString().slice(0, 5); // HH:MM
        }

        function mostrarAviso(msg) {
            avisoMsg.textContent = msg;
            aviso.classList.remove('d-none');
        }

        function ocultarAviso() {
            aviso.classList.add('d-none');
        }

        function validar() {
            if (!fi.value) { ocultarAviso(); return true; }

            // Fecha inicio no puede ser anterior a hoy
            if (fi.value < hoy()) {
                mostrarAviso('La fecha de inicio no puede ser anterior a la fecha actual.');
                return false;
            }

            // Si fecha inicio es hoy, la hora de inicio no puede ser anterior a la hora actual
            if (fi.value === hoy() && hi.value && hi.value < horaActual()) {
                mostrarAviso('Si el mantenimiento empieza hoy, la hora de inicio no puede ser anterior a la hora actual (' + horaActual() + ').');
                return false;
            }

            if (!ff.value) { ocultarAviso(); return true; }

            // fechaFin < fechaInicio
            if (ff.value < fi.value) {
                mostrarAviso('La fecha de fin no puede ser anterior a la de inicio.');
                return false;
            }

            // Mismo dia: horaFin debe ser posterior a horaInicio
            if (ff.value === fi.value && hi.value && hf.value && hf.value <= hi.value) {
                mostrarAviso('Para mantenimientos del mismo dia, la hora de fin debe ser posterior a la hora de inicio.');
                return false;
            }

            ocultarAviso();
            return true;
        }

        fi.addEventListener('change', validar);
        ff.addEventListener('change', validar);
        hi.addEventListener('change', validar);
        hf.addEventListener('change', validar);

        // Bloquear envio si hay error
        document.querySelector('form').addEventListener('submit', function (e) {
            if (!validar()) {
                e.preventDefault();
                aviso.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        // Ejecucion inicial (si hay valores al cargar — p. ej. tras error de servidor)
        validar();
    })();
</script>
</body>
</html>
