<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentGo - Crear cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --teal-600: #0d9488; --teal-700: #0f766e; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--teal-700) 0%, #115e59 60%, #0f4c44 100%);
            display: flex; align-items: center; padding: 2rem 0;
        }
        .registro-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
        .brand-icon { width:52px;height:52px;border-radius:14px;background:var(--teal-600);
                      display:flex;align-items:center;justify-content:center;margin:0 auto; }
        .btn-teal { background:var(--teal-600);color:#fff;border:none; }
        .btn-teal:hover { background:var(--teal-700);color:#fff; }
        .form-control:focus, .form-select:focus {
            border-color:var(--teal-600); box-shadow:0 0 0 .2rem rgba(13,148,136,.2);
        }
        .form-label { font-size:.88rem; font-weight:500; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card registro-card">
                <div class="card-body p-5">
                    <!-- Cabecera -->
                    <div class="text-center mb-4">
                        <div class="brand-icon mb-3">
                            <i class="bi bi-car-front-fill text-white" style="font-size:1.5rem;"></i>
                        </div>
                        <h2 class="fw-bold mb-0">Crear cuenta</h2>
                        <p class="text-muted small mt-1">Unete a RentGo y empieza a alquilar</p>
                    </div>

                    <form th:action="@{/registro}" th:object="${usuario}" method="post" novalidate>
                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger py-2">
                            <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                                       id="nombre" th:field="*{nombre}" placeholder="Tu nombre">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                            </div>

                            <div class="col-md-6">
                                <label for="apellidos" class="form-label">Apellidos</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('apellidos')} ? 'is-invalid'"
                                       id="apellidos" th:field="*{apellidos}" placeholder="Primer Segundo">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}"></div>
                                <small class="form-text text-muted">Dos apellidos separados por espacio</small>
                            </div>

                            <div class="col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       id="email" th:field="*{email}" placeholder="tu@email.com">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>

                            <div class="col-md-6">
                                <label for="telefono" class="form-label">Telefono</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid'"
                                       id="telefono" th:field="*{telefono}" maxlength="9" placeholder="6XXXXXXXX">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                                <small class="form-text text-muted">Debe empezar por 6 o 7</small>
                            </div>

                            <div class="col-md-4">
                                <label for="dni" class="form-label">DNI</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('dni')} ? 'is-invalid'"
                                       id="dni" th:field="*{dni}" maxlength="9" placeholder="12345678A">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></div>
                            </div>

                            <div class="col-md-8">
                                <label for="direccion" class="form-label">Direccion</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid'"
                                       id="direccion" th:field="*{direccion}" placeholder="Tu direccion completa">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></div>
                            </div>

                            <div class="col-md-6">
                                <label for="password" class="form-label">Contrasena</label>
                                <input type="password" class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       id="password" th:field="*{password}" placeholder="Minimo 6 caracteres">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>

                            <div class="col-12 mt-1">
                                <button type="submit" class="btn btn-teal w-100 py-2 fw-500">
                                    <i class="bi bi-person-plus me-1"></i>Crear cuenta
                                </button>
                            </div>
                        </div>
                    </form>

                    <hr class="my-4">
                    <div class="text-center">
                        <p class="mb-0 small">¿Ya tienes cuenta?
                            <a th:href="@{/login}" class="fw-bold" style="color:var(--teal-600);">Inicia sesion</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
