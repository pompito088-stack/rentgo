<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RentGo - Registro de usuario">
    <title>RentGo - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
        .registro-card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.3); }
    </style>
</head>
<body class="d-flex align-items-center py-4">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card registro-card">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-car-front-fill text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-2 fw-bold">RentGo</h2>
                        <p class="text-muted">Crear una cuenta</p>
                    </div>

                    <form th:action="@{/registro}" th:object="${usuario}" method="post" novalidate>

                        <!-- Errores generales -->
                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                            <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                        </div>


                        <div class="row g-3">
                            <!-- Nombre -->
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                                       id="nombre" th:field="*{nombre}" placeholder="Tu nombre">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}"
                                     th:errors="*{nombre}"></div>
                            </div>

                            <!-- Apellidos -->
                            <div class="col-md-6">
                                <label for="apellidos" class="form-label">Apellidos</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('apellidos')} ? 'is-invalid'"
                                       id="apellidos" th:field="*{apellidos}" placeholder="Primer Segundo">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('apellidos')}"
                                     th:errors="*{apellidos}"></div>
                                <small class="form-text text-muted">Dos apellidos separados por espacio</small>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                       id="email" th:field="*{email}" placeholder="tu@email.com">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}"></div>
                            </div>

                            <!-- Telefono -->
                            <div class="col-md-6">
                                <label for="telefono" class="form-label">Telefono</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid'"
                                       id="telefono" th:field="*{telefono}" maxlength="9" placeholder="6XXXXXXXX">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}"
                                     th:errors="*{telefono}"></div>
                                <small class="form-text text-muted">Debe empezar por 6 o 7</small>
                            </div>

                            <!-- DNI -->
                            <div class="col-md-4">
                                <label for="dni" class="form-label">DNI</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('dni')} ? 'is-invalid'"
                                       id="dni" th:field="*{dni}" maxlength="9" placeholder="12345678A">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('dni')}"
                                     th:errors="*{dni}"></div>
                            </div>

                            <!-- Direccion -->
                            <div class="col-md-8">
                                <label for="direccion" class="form-label">Direccion</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid'"
                                       id="direccion" th:field="*{direccion}" placeholder="Tu direccion completa">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('direccion')}"
                                     th:errors="*{direccion}"></div>
                            </div>

                            <!-- Contrasena -->
                            <div class="col-md-6">
                                <label for="password" class="form-label">Contrasena</label>
                                <input type="password" class="form-control"
                                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                       id="password" th:field="*{password}" placeholder="Minimo 6 caracteres">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                     th:errors="*{password}"></div>
                            </div>

                            <!-- Boton -->
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary w-100 py-2">
                                    <i class="bi bi-person-plus me-1"></i>Registrarse
                                </button>
                            </div>
                        </div>
                    </form>

                    <hr>
                    <div class="text-center">
                        <p class="mb-0">¿Ya tienes cuenta?
                            <a th:href="@{/login}" class="fw-bold">Inicia sesion</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
