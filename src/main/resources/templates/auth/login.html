<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentGo - Iniciar Sesion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --teal-600: #0d9488; --teal-700: #0f766e; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--teal-700) 0%, #115e59 60%, #0f4c44 100%);
            display: flex; align-items: center;
        }
        .login-card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
        .brand-icon { width:60px;height:60px;border-radius:16px;background:var(--teal-600);
                      display:flex;align-items:center;justify-content:center;margin:0 auto; }
        .btn-teal { background:linear-gradient(135deg,var(--teal-600),var(--teal-700));color:#fff;border:none;border-radius:10px;font-weight:600;box-shadow:0 3px 10px rgba(13,148,136,.3);transition:transform .15s,box-shadow .2s; }
        .btn-teal:hover { background:linear-gradient(135deg,var(--teal-700),#115e59);color:#fff;transform:translateY(-1px);box-shadow:0 5px 16px rgba(13,148,136,.35); }
        .form-control:focus { border-color:var(--teal-600); box-shadow:0 0 0 .2rem rgba(13,148,136,.2); }
        .input-group-text { background:#f8fafc; border-right:none; cursor:pointer; }
        .input-group .form-control { border-left:none; }
        .input-group .toggle-pw { background:#f8fafc; border-left:none; border-color:#dee2e6; cursor:pointer; }
        .input-group .toggle-pw:hover { background:#e9ecef; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="brand-icon mb-3">
                            <i class="bi bi-car-front-fill text-white" style="font-size:1.8rem;"></i>
                        </div>
                        <h2 class="fw-bold mb-0">RentGo</h2>
                        <p class="text-muted small mt-1">Accede a tu cuenta</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${exito}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-500" style="font-size:.88rem;">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                       placeholder="tu@email.com" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-500" style="font-size:.88rem;">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill text-muted"></i></span>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Tu contraseña" required>
                                <button class="btn toggle-pw border" type="button" id="togglePw" tabindex="-1"
                                        title="Mostrar / ocultar contraseña">
                                    <i class="bi bi-eye" id="togglePwIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-teal w-100 py-2 fw-500">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar sesion
                        </button>
                    </form>

                    <hr class="my-4">
                    <div class="text-center">
                        <p class="mb-0 small">¿No tienes cuenta?
                            <a th:href="@{/registro}" class="fw-bold" style="color:var(--teal-600);">Registrate aqui</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('togglePw').addEventListener('click', function () {
        const pw = document.getElementById('password');
        const icon = document.getElementById('togglePwIcon');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pw.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
</script>
</body>
</html>
