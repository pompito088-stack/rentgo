<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Extra')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1 th:text="${extra.id != null ? 'Editar Extra' : 'Nuevo Extra'}">Formulario</h1>
        <hr>
        <form th:action="@{/extras/guardar}" th:object="${extra}" method="post" class="row g-3" novalidate>
            <input type="hidden" th:field="*{id}">
            <div class="col-md-6">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control"
                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                       id="nombre" th:field="*{nombre}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>
            <div class="col-md-6">
                <label for="precioDia" class="form-label">Precio / dia (€)</label>
                <input type="number" step="0.01" class="form-control"
                       th:classappend="${#fields.hasErrors('precioDia')} ? 'is-invalid'"
                       id="precioDia" th:field="*{precioDia}" min="0.01">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('precioDia')}" th:errors="*{precioDia}"></div>
            </div>
            <div class="col-md-12">
                <label for="descripcion" class="form-label">Descripcion</label>
                <input type="text" class="form-control"
                       th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"
                       id="descripcion" th:field="*{descripcion}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
                <a th:href="@{/extras}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
