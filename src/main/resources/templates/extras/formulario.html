<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Extra')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title">
            <i class="bi bi-stars me-2" style="color:var(--teal-600)"></i>
            <span th:text="${extra.id != null ? 'Editar Extra' : 'Nuevo Extra'}">Formulario</span>
        </h1>
        <div class="topbar-right">
            <a th:href="@{/extras}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
    </header>
    <main class="admin-page-content">
        <div class="admin-card">
            <form th:action="@{/extras/guardar}" th:object="${extra}" method="post" class="row g-3" novalidate>
                <input type="hidden" th:field="*{id}">
                <div class="col-md-6">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                           id="nombre" th:field="*{nombre}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>
                <div class="col-md-6">
                    <label for="precioDia" class="form-label">Precio / dia (€)</label>
                    <input type="number" step="0.01" class="form-control" th:classappend="${#fields.hasErrors('precioDia')} ? 'is-invalid'"
                           id="precioDia" th:field="*{precioDia}" min="0.01">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('precioDia')}" th:errors="*{precioDia}"></div>
                </div>
                <div class="col-md-12">
                    <label for="descripcion" class="form-label">Descripcion</label>
                    <input type="text" class="form-control" th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"
                           id="descripcion" th:field="*{descripcion}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-teal"><i class="bi bi-save me-1"></i>Guardar</button>
                    <a th:href="@{/extras}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
