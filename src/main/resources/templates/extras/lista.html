<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Extras')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1>Extras</h1>
        <p class="text-muted">Consulta los extras disponibles para complementar cada reserva.</p>
        <a th:if="${esAdmin}" th:href="@{/extras/nuevo}" class="btn btn-success mb-3"><i class="bi bi-plus-circle me-1"></i>Nuevo Extra</a>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripcion</th>
                    <th>Precio/dia</th>
                    <th th:if="${esAdmin}">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="extra : ${extras}">
                    <td th:text="${extra.id}"></td>
                    <td th:text="${extra.nombre}"></td>
                    <td th:text="${extra.descripcion}"></td>
                    <td th:text="${extra.precioDia + ' €'}"></td>
                    <td th:if="${esAdmin}">
                        <a th:href="@{/extras/editar/{id}(id=${extra.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a th:href="@{/extras/eliminar/{id}(id=${extra.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Estas seguro de eliminar este extra?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(extras)}">
                    <td th:colspan="${esAdmin} ? 5 : 4" class="text-center">No hay extras registrados.</td>
                </tr>
            </tbody>
        </table>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
