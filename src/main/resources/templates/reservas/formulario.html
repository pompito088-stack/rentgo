<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Reserva')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1 th:text="${reserva.id != null ? 'Editar Reserva' : 'Nueva Reserva'}">Formulario</h1>
        <hr>
        <form th:action="@{/reservas/guardar}" th:object="${reserva}" method="post" class="row g-3" novalidate>
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{fechaReserva}">

            <!-- Usuario (solo admin) -->
            <div class="col-md-6" th:if="${esAdmin}">
                <label for="usuario" class="form-label">Usuario</label>
                <select class="form-select" id="usuario" th:field="*{usuario.id}" required>
                    <option value="">-- Seleccionar usuario --</option>
                    <option th:each="u : ${usuarios}" th:value="${u.id}"
                            th:text="${u.nombre + ' ' + u.apellidos + ' (' + u.email + ')'}"></option>
                </select>
            </div>

            <!-- Vehiculo -->
            <div class="col-md-6">
                <label for="vehiculo" class="form-label">Vehiculo</label>
                <select class="form-select" id="vehiculo" th:field="*{vehiculo.id}" required>
                    <option value="">-- Seleccionar vehiculo --</option>
                    <option th:each="v : ${vehiculos}" th:value="${v.id}"
                            th:text="${v.modelo.marca.nombre + ' ' + v.modelo.nombre + ' (' + v.matricula + ')'}"></option>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('vehiculo')}" th:errors="*{vehiculo}"></div>
            </div>

            <!-- Fecha Inicio -->
            <div class="col-md-3">
                <label for="fechaInicio" class="form-label">Fecha Inicio</label>
                <input type="date" class="form-control"
                       th:classappend="${#fields.hasErrors('fechaInicio')} ? 'is-invalid'"
                       id="fechaInicio" th:field="*{fechaInicio}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></div>
            </div>

            <!-- Fecha Fin -->
            <div class="col-md-3">
                <label for="fechaFin" class="form-label">Fecha Fin</label>
                <input type="date" class="form-control"
                       th:classappend="${#fields.hasErrors('fechaFin')} ? 'is-invalid'"
                       id="fechaFin" th:field="*{fechaFin}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}"></div>
            </div>

            <!-- Precio Total -->
            <div class="col-md-3">
                <label for="precioTotal" class="form-label">Precio Total (€)</label>
                <input type="number" step="0.01" class="form-control"
                       th:classappend="${#fields.hasErrors('precioTotal')} ? 'is-invalid'"
                       id="precioTotal" th:field="*{precioTotal}" min="0">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('precioTotal')}" th:errors="*{precioTotal}"></div>
            </div>

            <!-- Estado -->
            <div class="col-md-3">
                <label for="estado" class="form-label">Estado</label>
                <select class="form-select" id="estado" th:field="*{estado}">
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                </select>
            </div>

            <!-- Sucursal Recogida -->
            <div class="col-md-6">
                <label for="sucursalRecogida" class="form-label">Sucursal Recogida</label>
                <select class="form-select" id="sucursalRecogida" th:field="*{sucursalRecogida.id}" required>
                    <option value="">-- Seleccionar sucursal --</option>
                    <option th:each="s : ${sucursales}" th:value="${s.id}"
                            th:text="${s.nombre + ' (' + s.ciudad + ')'}"></option>
                </select>
            </div>

            <!-- Sucursal Devolucion -->
            <div class="col-md-6">
                <label for="sucursalDevolucion" class="form-label">Sucursal Devolucion</label>
                <select class="form-select" id="sucursalDevolucion" th:field="*{sucursalDevolucion.id}" required>
                    <option value="">-- Seleccionar sucursal --</option>
                    <option th:each="s : ${sucursales}" th:value="${s.id}"
                            th:text="${s.nombre + ' (' + s.ciudad + ')'}"></option>
                </select>
            </div>

            <!-- Observaciones -->
            <div class="col-md-12">
                <label for="observaciones" class="form-label">Observaciones</label>
                <textarea class="form-control" id="observaciones" th:field="*{observaciones}" rows="3"></textarea>
            </div>

            <!-- Botones -->
            <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
                <a th:href="@{/reservas}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
