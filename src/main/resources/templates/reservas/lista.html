<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Reservas')}"></head>

<!-- ===== ADMIN VIEW ===== -->
<body class="admin-layout" th:if="${esAdmin}">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title"><i class="bi bi-calendar-check me-2" style="color:var(--teal-600)"></i>Todas las Reservas</h1>
        <div class="topbar-right">
            <span class="topbar-badge" th:text="${#lists.size(reservas)} + ' reservas'"></span>
        </div>
    </header>
    <main class="admin-page-content">
        <section class="admin-table">
            <table class="table table-hover mb-0">
                <thead>
                    <tr><th>ID</th><th>Usuario</th><th>Vehiculo</th><th>Recogida</th><th>Devolución</th><th>Precio Total</th><th>Estado</th></tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${reservas}">
                        <td th:text="${r.id}"></td>
                        <td th:text="${r.usuario.nombre + ' ' + r.usuario.apellidos}"></td>
                        <td th:text="${r.vehiculo.modelo.marca.nombre + ' ' + r.vehiculo.modelo.nombre}"></td>
                        <td>
                            <span th:text="${r.fechaInicio}"></span>
                            <small class="text-muted d-block" th:text="${r.horaInicio}"></small>
                        </td>
                        <td>
                            <span th:text="${r.fechaFin}"></span>
                            <small class="text-muted d-block" th:text="${r.horaFin}"></small>
                        </td>
                        <td class="fw-500" th:text="${r.precioTotal + ' €'}"></td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${r.estado == 'confirmada'} ? 'bg-success' :
                                                  (${r.estado == 'pendiente'} ? 'bg-warning text-dark' :
                                                  (${r.estado == 'cancelada'} ? 'bg-danger' : 'bg-secondary'))"
                                  th:text="${r.estado}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reservas)}">
                        <td colspan="7" class="text-center text-muted py-4">No hay reservas registradas.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>

<!-- ===== CLIENTE VIEW ===== -->
<body class="client-layout" th:unless="${esAdmin}">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container mt-4">
    <section>
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h1>Mis Reservas</h1>
            <a th:href="@{/reservas/nuevo}" class="btn text-white" style="background:var(--teal-600)">
                <i class="bi bi-plus-circle me-1"></i>Nueva Reserva
            </a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover border rounded">
                <thead style="background:#f9fafb;">
                    <tr><th>ID</th><th>Vehiculo</th><th>Recogida</th><th>Devolución</th><th>Precio Total</th><th>Estado</th></tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${reservas}">
                        <td th:text="${r.id}"></td>
                        <td th:text="${r.vehiculo.modelo.marca.nombre + ' ' + r.vehiculo.modelo.nombre}"></td>
                        <td>
                            <span th:text="${r.fechaInicio}"></span>
                            <small class="text-muted d-block" th:text="${r.horaInicio}"></small>
                        </td>
                        <td>
                            <span th:text="${r.fechaFin}"></span>
                            <small class="text-muted d-block" th:text="${r.horaFin}"></small>
                        </td>
                        <td th:text="${r.precioTotal + ' €'}"></td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${r.estado == 'confirmada'} ? 'bg-success' :
                                                  (${r.estado == 'pendiente'} ? 'bg-warning text-dark' :
                                                  (${r.estado == 'cancelada'} ? 'bg-danger' : 'bg-secondary'))"
                                  th:text="${r.estado}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reservas)}">
                        <td colspan="6" class="text-center text-muted py-4">No tienes reservas registradas.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
