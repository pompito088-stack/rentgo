<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Marcas')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1>Marcas</h1>
        <a th:href="@{/marcas/nuevo}" class="btn btn-success mb-3"><i class="bi bi-plus-circle me-1"></i>Nueva Marca</a>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="marca : ${marcas}">
                    <td th:text="${marca.id}"></td>
                    <td th:text="${marca.nombre}"></td>
                    <td>
                        <a th:href="@{/marcas/editar/{id}(id=${marca.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a th:href="@{/marcas/eliminar/{id}(id=${marca.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Estas seguro de eliminar esta marca?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(marcas)}">
                    <td colspan="3" class="text-center">No hay marcas registradas.</td>
                </tr>
            </tbody>
        </table>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
