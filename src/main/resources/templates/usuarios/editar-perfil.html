<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Editar perfil')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h1>Editar mis datos</h1>
                <p class="text-muted mb-0">Modifica los datos de tu cuenta.</p>
            </div>
            <span class="badge bg-primary fs-6">Cliente</span>
        </div>
        <hr>

        <!-- Mensaje de error global -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/mi-perfil/guardar}" th:object="${usuario}" method="post" class="row g-3" novalidate>
            <input type="hidden" th:field="*{id}">
            <!-- Preservar campos que no se editan -->
            <input type="hidden" th:field="*{email}">
            <input type="hidden" th:field="*{dni}">
            <input type="hidden" th:field="*{password}">
            <input type="hidden" th:field="*{tipoUsuario.id}">

            <div class="col-md-6">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="col-md-6">
                <label for="apellidos" class="form-label">Apellidos</label>
                <input type="text" class="form-control" id="apellidos" th:field="*{apellidos}" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}"></div>
            </div>

            <div class="col-md-6">
                <label for="telefono" class="form-label">Telefono</label>
                <input type="text" class="form-control" id="telefono" th:field="*{telefono}" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label text-muted">Email <small>(no editable)</small></label>
                <div class="form-control bg-light" th:text="${usuario.email}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label text-muted">DNI <small>(no editable)</small></label>
                <div class="form-control bg-light" th:text="${usuario.dni}"></div>
            </div>

            <div class="col-12">
                <label for="direccion" class="form-label">Direccion</label>
                <input type="text" class="form-control" id="direccion" th:field="*{direccion}" required>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save me-1"></i>Guardar cambios
                </button>
                <a th:href="@{/mi-perfil}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
