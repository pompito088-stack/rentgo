<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Usuario')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title">
            <i class="bi bi-people me-2" style="color:var(--teal-600)"></i>
            <span th:text="${usuario.id != null ? 'Editar Usuario' : 'Nuevo Usuario'}">Formulario</span>
        </h1>
        <div class="topbar-right">
            <a th:href="@{/usuarios}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
    </header>
    <main class="admin-page-content">
        <div class="admin-card">
            <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post" class="row g-3" novalidate>
                <input type="hidden" th:field="*{id}">

                <!-- Nombre -->
                <div class="col-md-6">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                           id="nombre" th:field="*{nombre}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}"
                         th:errors="*{nombre}"></div>
                </div>

                <!-- Apellidos -->
                <div class="col-md-6">
                    <label for="apellidos" class="form-label">Apellidos</label>
                    <input type="text" class="form-control"
                           th:classappend="${#fields.hasErrors('apellidos')} ? 'is-invalid'"
                           id="apellidos" th:field="*{apellidos}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('apellidos')}"
                         th:errors="*{apellidos}"></div>
                    <small class="form-text text-muted">Dos apellidos separados por espacio</small>
                </div>

                <!-- Email -->
                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           id="email" th:field="*{email}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}"></div>
                    <small class="form-text text-muted">El tipo se asigna automáticamente según el email</small>
                </div>

                <!-- Telefono -->
                <div class="col-md-3">
                    <label for="telefono" class="form-label">Teléfono</label>
                    <input type="text" class="form-control"
                           th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid'"
                           id="telefono" th:field="*{telefono}" maxlength="9">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}"
                         th:errors="*{telefono}"></div>
                    <small class="form-text text-muted">Empieza por 6 o 7</small>
                </div>

                <!-- DNI -->
                <div class="col-md-3">
                    <label for="dni" class="form-label">DNI</label>
                    <input type="text" class="form-control"
                           th:classappend="${#fields.hasErrors('dni')} ? 'is-invalid'"
                           id="dni" th:field="*{dni}" maxlength="9">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('dni')}"
                         th:errors="*{dni}"></div>
                </div>

                <!-- Direccion -->
                <div class="col-md-12">
                    <label for="direccion" class="form-label">Dirección</label>
                    <input type="text" class="form-control"
                           th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid'"
                           id="direccion" th:field="*{direccion}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('direccion')}"
                         th:errors="*{direccion}"></div>
                </div>

                <!-- Contrasena -->
                <div class="col-md-6">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           id="password" th:field="*{password}">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                    <small class="form-text text-muted">Mínimo 6 caracteres</small>
                </div>

                <!-- Botones -->
                <div class="col-12 d-flex gap-2 pt-2">
                    <button type="submit" class="btn btn-teal-lg"><i class="bi bi-save me-1"></i>Guardar</button>
                    <a th:href="@{/usuarios}" class="btn btn-outline-secondary" style="border-radius:10px;padding:.65rem 1.25rem;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
