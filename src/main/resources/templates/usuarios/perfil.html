<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Mi perfil')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h1>Mi perfil</h1>
                <p class="text-muted mb-0">Consulta los datos de tu cuenta en RentGo.</p>
            </div>
            <span class="badge fs-6"
                  th:classappend="${esAdmin ? 'bg-danger' : 'bg-primary'}"
                  th:text="${esAdmin ? 'Administrador' : 'Cliente'}"></span>
        </div>
        <hr>

        <div class="row g-4">
            <div class="col-lg-4">
                <article class="card shadow-sm h-100">
                    <div class="card-body text-center">
                        <i class="bi bi-person-circle text-primary" style="font-size: 5rem;"></i>
                        <h4 class="mt-3 mb-1" th:text="${usuario.nombre + ' ' + usuario.apellidos}"></h4>
                        <p class="text-muted mb-0" th:text="${usuario.email}"></p>
                    </div>
                </article>
            </div>

            <div class="col-lg-8">
                <article class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Datos personales</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted">Nombre</label>
                                <div class="form-control bg-light" th:text="${usuario.nombre}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Apellidos</label>
                                <div class="form-control bg-light" th:text="${usuario.apellidos}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Email</label>
                                <div class="form-control bg-light" th:text="${usuario.email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Telefono</label>
                                <div class="form-control bg-light" th:text="${usuario.telefono}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">DNI</label>
                                <div class="form-control bg-light" th:text="${usuario.dni}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted">Tipo de usuario</label>
                                <div class="form-control bg-light" th:text="${usuario.tipoUsuario.nombre}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-muted">Direccion</label>
                                <div class="form-control bg-light" th:text="${usuario.direccion}"></div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
