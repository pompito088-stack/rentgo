<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Mi Perfil')}"></head>
<body class="client-layout">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main>
    <!-- Mini hero -->
    <div style="background:linear-gradient(135deg,var(--teal-800),var(--teal-600));padding:2rem 0 1.75rem;color:#fff;">
        <div class="container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2" style="--bs-breadcrumb-divider-color:rgba(255,255,255,.5);">
                    <li class="breadcrumb-item"><a th:href="@{/}" style="color:rgba(255,255,255,.7);text-decoration:none;">Inicio</a></li>
                    <li class="breadcrumb-item active" style="color:#fff;">Mi Perfil</li>
                </ol>
            </nav>
            <h1 style="font-size:1.6rem;font-weight:800;margin:0;">
                <i class="bi bi-person-circle me-2"></i>Mi Perfil
            </h1>
        </div>
    </div>

    <div class="container py-4">
        <div class="row g-4">

            <!-- ── Columna Avatar + Acciones ── -->
            <div class="col-lg-4">
                <!-- Tarjeta avatar -->
                <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:2rem;text-align:center;margin-bottom:1rem;">
                    <div class="profile-avatar"
                         th:text="${usuario.nombre.substring(0,1).toUpperCase()}"></div>
                    <h2 style="font-size:1.2rem;font-weight:700;color:#111827;margin-bottom:.2rem;"
                        th:text="${usuario.nombre + ' ' + usuario.apellidos}"></h2>
                    <p style="font-size:.85rem;color:#6b7280;margin-bottom:1rem;" th:text="${usuario.email}"></p>
                    <!-- Badge rol -->
                    <span class="badge fs-6 rounded-pill px-3 py-2"
                          th:classappend="${esAdmin ? 'bg-danger' : ''}"
                          th:style="${!esAdmin ? 'background:var(--teal-600);' : ''}"
                          th:text="${esAdmin ? 'Administrador' : 'Cliente'}"></span>
                </div>

                <!-- Acciones rápidas -->
                <div style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:1.25rem;">
                    <p style="font-size:.75rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem;">Acciones rápidas</p>
                    <div class="d-flex flex-column gap-2">
                        <a th:if="${!esAdmin}" th:href="@{/mi-perfil/editar}"
                           class="btn btn-sm d-flex align-items-center gap-2"
                           style="border:1.5px solid var(--teal-600);color:var(--teal-600);border-radius:8px;text-align:left;">
                            <i class="bi bi-pencil-square"></i> Editar mis datos
                        </a>
                        <a th:href="@{/reservas}"
                           class="btn btn-sm d-flex align-items-center gap-2"
                           style="border:1px solid #e5e7eb;color:#374151;border-radius:8px;text-align:left;">
                            <i class="bi bi-calendar-check" style="color:var(--teal-500);"></i> Mis reservas
                        </a>
                        <a th:href="@{/vehiculos}"
                           class="btn btn-sm d-flex align-items-center gap-2"
                           style="border:1px solid #e5e7eb;color:#374151;border-radius:8px;text-align:left;">
                            <i class="bi bi-car-front" style="color:var(--teal-500);"></i> Ver vehículos
                        </a>
                        <a th:href="@{/logout}"
                           class="btn btn-sm d-flex align-items-center gap-2"
                           style="border:1px solid #fee2e2;color:#dc2626;border-radius:8px;text-align:left;">
                            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                        </a>
                    </div>
                </div>
            </div>

            <!-- ── Columna Datos personales ── -->
            <div class="col-lg-8">
                <section style="background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:1.75rem;">
                    <header class="d-flex align-items-center justify-content-between mb-4">
                        <h2 style="font-size:1rem;font-weight:700;color:#111827;margin:0;">
                            <i class="bi bi-person me-2" style="color:var(--teal-500);"></i>Datos personales
                        </h2>
                        <a th:if="${!esAdmin}" th:href="@{/mi-perfil/editar}"
                           class="btn btn-sm"
                           style="background:var(--teal-50);border:1px solid var(--teal-100);color:var(--teal-700);border-radius:8px;">
                            <i class="bi bi-pencil me-1"></i>Editar
                        </a>
                    </header>

                    <div class="row g-3">
                        <div class="col-sm-6">
                            <div class="profile-field-label">Nombre</div>
                            <div class="profile-field-value" th:text="${usuario.nombre}"></div>
                        </div>
                        <div class="col-sm-6">
                            <div class="profile-field-label">Apellidos</div>
                            <div class="profile-field-value" th:text="${usuario.apellidos}"></div>
                        </div>
                        <div class="col-sm-6">
                            <div class="profile-field-label">Email</div>
                            <div class="profile-field-value" th:text="${usuario.email}"></div>
                        </div>
                        <div class="col-sm-6">
                            <div class="profile-field-label">Teléfono</div>
                            <div class="profile-field-value" th:text="${usuario.telefono}"></div>
                        </div>
                        <div class="col-sm-6">
                            <div class="profile-field-label">DNI</div>
                            <div class="profile-field-value" th:text="${usuario.dni}"></div>
                        </div>
                        <div class="col-sm-6">
                            <div class="profile-field-label">Tipo de usuario</div>
                            <div class="profile-field-value d-flex align-items-center gap-2">
                                <span class="badge rounded-pill"
                                      th:classappend="${esAdmin ? 'bg-danger' : ''}"
                                      th:style="${!esAdmin ? 'background:var(--teal-600);' : ''}"
                                      th:text="${usuario.tipoUsuario.nombre}"></span>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="profile-field-label">Dirección</div>
                            <div class="profile-field-value">
                                <i class="bi bi-geo-alt me-1" style="color:#9ca3af;"></i>
                                <span th:text="${usuario.direccion}"></span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Garantías de seguridad -->
                <div class="d-flex flex-wrap gap-3 mt-3 px-1">
                    <span style="font-size:.78rem;color:#6b7280;"><i class="bi bi-shield-lock-fill me-1" style="color:#22c55e;"></i>Datos protegidos</span>
                    <span style="font-size:.78rem;color:#6b7280;"><i class="bi bi-lock-fill me-1" style="color:var(--teal-500);"></i>Contraseña cifrada</span>
                    <span style="font-size:.78rem;color:#6b7280;"><i class="bi bi-check-circle-fill me-1" style="color:#3b82f6;"></i>Cuenta verificada</span>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
