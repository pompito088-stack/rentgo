<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Formulario Modelo')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <section>
        <h1 th:text="${modelo.id != null ? 'Editar Modelo' : 'Nuevo Modelo'}">Formulario</h1>
        <hr>
        <form th:action="@{/modelos/guardar}" th:object="${modelo}" method="post" class="row g-3" novalidate>
            <input type="hidden" th:field="*{id}">
            <div class="col-md-6">
                <label for="marca" class="form-label">Marca</label>
                <select class="form-select" id="marca" th:field="*{marca.id}" required>
                    <option value="">-- Seleccionar marca --</option>
                    <option th:each="m : ${marcas}" th:value="${m.id}" th:text="${m.nombre}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label for="nombre" class="form-label">Nombre del Modelo</label>
                <input type="text" class="form-control"
                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                       id="nombre" th:field="*{nombre}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}"
                     th:errors="*{nombre}"></div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Guardar</button>
                <a th:href="@{/modelos}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
