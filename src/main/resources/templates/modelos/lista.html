<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Modelos', null)}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title"><i class="bi bi-diagram-3 me-2" style="color:var(--teal-600)"></i>Modelos</h1>
        <div class="topbar-right">
            <a th:href="@{/modelos/nuevo}" class="btn btn-teal btn-sm"><i class="bi bi-plus-lg me-1"></i>Nuevo Modelo</a>
        </div>
    </header>
    <main class="admin-page-content">
        <!-- Barra de busqueda -->
        <div class="admin-card p-3 mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-6">
                    <label class="form-label mb-1" style="font-size:.78rem;font-weight:600;color:#6b7280;"><i class="bi bi-search me-1"></i>Buscar modelo / marca</label>
                    <input type="text" id="buscarModelo" class="form-control form-control-sm" placeholder="Nombre de modelo o marca..." oninput="filtrarModelos()">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="document.getElementById('buscarModelo').value='';filtrarModelos()">
                        <i class="bi bi-x-circle me-1"></i>Limpiar
                    </button>
                </div>
                <div class="col-md-4 text-end">
                    <small class="text-muted"><span id="contModelos">0</span> modelo(s)</small>
                </div>
            </div>
        </div>

        <section class="admin-table">
            <table class="table table-hover mb-0" id="tablaModelos">
                <thead>
                    <tr><th>#</th><th>Marca</th><th>Modelo</th><th class="text-end">Acciones</th></tr>
                </thead>
                <tbody>
                    <tr th:each="modelo : ${modelos}">
                        <td><span class="badge" style="background:var(--teal-100);color:var(--teal-700);font-weight:700;" th:text="${modelo.id}"></span></td>
                        <td>
                            <span class="badge" style="background:#eff6ff;color:#2563eb;font-weight:600;border:1px solid #bfdbfe;" th:text="${modelo.marca.nombre}"></span>
                        </td>
                        <td class="fw-500" th:text="${modelo.nombre}"></td>
                        <td class="text-end">
                            <div class="d-inline-flex gap-1">
                                <a th:href="@{/modelos/editar/{id}(id=${modelo.id})}" class="btn-action-edit"><i class="bi bi-pencil me-1"></i>Editar</a>
                                <a th:href="@{/modelos/eliminar/{id}(id=${modelo.id})}" class="btn-action-delete"
                                   onclick="return confirm('Eliminar este modelo?')"><i class="bi bi-trash me-1"></i>Eliminar</a>
                            </div>
                        </td>
                    </tr>
                    <tr id="sinResultadosModelos" class="d-none">
                        <td colspan="4" class="text-center text-muted py-4"><i class="bi bi-search me-2"></i>Sin resultados.</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(modelos)}">
                        <td colspan="4" class="text-center text-muted py-4">No hay modelos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    function filtrarModelos() {
        var texto = (document.getElementById('buscarModelo').value || '').toLowerCase();
        var filas = Array.from(document.querySelectorAll('#tablaModelos tbody tr')).filter(function(r){ return !r.id; });
        var visibles = 0;
        filas.forEach(function(fila) {
            var cumple = !texto || fila.textContent.toLowerCase().includes(texto);
            fila.classList.toggle('d-none', !cumple);
            if (cumple) visibles++;
        });
        document.getElementById('contModelos').textContent = visibles;
        document.getElementById('sinResultadosModelos').classList.toggle('d-none', visibles > 0);
    }
    document.addEventListener('DOMContentLoaded', filtrarModelos);
</script>
</body>
</html>
