<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('RentGo - Modelos')}"></head>
<body class="admin-layout">
<aside th:replace="~{fragments/layout :: admin-sidebar}"></aside>
<div class="admin-wrapper">
    <header class="admin-topbar">
        <h1 class="page-title"><i class="bi bi-diagram-3 me-2" style="color:var(--teal-600)"></i>Modelos</h1>
        <div class="topbar-right">
            <a th:href="@{/modelos/nuevo}" class="btn btn-teal btn-sm"><i class="bi bi-plus-lg me-1"></i>Nuevo Modelo</a>
        </div>
    </header>
    <main class="admin-page-content">
        <section class="admin-table">
            <table class="table table-hover mb-0">
                <thead>
                    <tr><th>ID</th><th>Marca</th><th>Modelo</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                    <tr th:each="modelo : ${modelos}">
                        <td th:text="${modelo.id}"></td>
                        <td th:text="${modelo.marca.nombre}"></td>
                        <td class="fw-500" th:text="${modelo.nombre}"></td>
                        <td>
                            <a th:href="@{/modelos/editar/{id}(id=${modelo.id})}" class="btn btn-warning btn-sm me-1"><i class="bi bi-pencil"></i></a>
                            <a th:href="@{/modelos/eliminar/{id}(id=${modelo.id})}" class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar este modelo?')"><i class="bi bi-trash"></i></a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(modelos)}">
                        <td colspan="4" class="text-center text-muted py-4">No hay modelos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer th:replace="~{fragments/layout :: admin-footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
